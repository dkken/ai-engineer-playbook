<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 工程师能力雷达图</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
            --orange: #d2991d;
            --red: #f85149;
            --radius: 8px;
            --shadow: 0 0 0 1px var(--border), 0 2px 8px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
            max-width: 920px;
            margin: 0 auto;
            padding: 24px 20px;
            background: var(--bg);
            color: var(--text);
        }
        h1 {
            text-align: center;
            color: var(--text);
            font-size: 1.75rem;
            margin-bottom: 20px;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); text-decoration: underline; }

        .container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        .chart-container {
            position: relative;
            height: 420px;
            margin: 20px 0;
        }
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        .input-group label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            font-weight: 500;
        }
        .input-group input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
        }
        .btn {
            background: #238636;
            color: #fff;
            border: 1px solid rgba(240,246,252,0.1);
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            display: block;
            margin: 20px auto 0;
            transition: background 0.2s;
        }
        .btn:hover { background: #2ea043; }

        .legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
        .info {
            background: rgba(88,166,255,0.06);
            border: 1px solid rgba(88,166,255,0.15);
            border-radius: 6px;
            padding: 12px 16px;
            margin: 0 0 16px 0;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .info strong { color: var(--accent); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            body { padding: 12px 10px; }
            .input-grid { grid-template-columns: 1fr; }
            .chart-container { height: 300px; }
            h1 { font-size: 22px; }
        }
        @media (min-width: 769px) and (max-width: 1024px) {
            .input-grid { grid-template-columns: repeat(2, 1fr); }
            .chart-container { height: 360px; }
        }
    </style>
</head>
<body>
    <h1>AI 工程师能力雷达图</h1>

    <div class="container">
        <div class="info">
            <strong>使用说明：</strong>根据你在 <a href="https://github.com/dkken/ai-engineer-playbook/blob/main/skill-assessment/self-assessment.md">self-assessment.md</a> 中的评估结果填写得分（0-5分），点击"生成雷达图"直观展示与市场需求的差距。
            <br><small>市场需求数据基于 2,445 份海外 JD + 国内公开报告综合分析（2026年），采用"市场预期模型"：技能重要性 = 当前需求 × 增长预期 + 薪资溢价 + 层级保底</small>
        </div>

        <div class="input-grid">
            <div class="input-group">
                <label>Python 编程</label>
                <input type="number" id="python" min="0" max="5" step="0.5" value="0" placeholder="0-5">
            </div>
            <div class="input-group">
                <label>软件工程</label>
                <input type="number" id="se" min="0" max="5" step="0.5" value="0" placeholder="0-5">
            </div>
            <div class="input-group">
                <label>LLM 应用开发</label>
                <input type="number" id="llm" min="0" max="5" step="0.5" value="0" placeholder="0-5">
            </div>
            <div class="input-group">
                <label>RAG 系统</label>
                <input type="number" id="rag" min="0" max="5" step="0.5" value="0" placeholder="0-5">
            </div>
            <div class="input-group">
                <label>Prompt Engineering</label>
                <input type="number" id="prompt" min="0" max="5" step="0.5" value="0" placeholder="0-5">
            </div>
            <div class="input-group">
                <label>容器化与部署</label>
                <input type="number" id="deploy" min="0" max="5" step="0.5" value="0" placeholder="0-5">
            </div>
            <div class="input-group">
                <label>Agent 开发</label>
                <input type="number" id="agent" min="0" max="5" step="0.5" value="0" placeholder="0-5">
            </div>
            <div class="input-group">
                <label>模型评估与优化</label>
                <input type="number" id="eval" min="0" max="5" step="0.5" value="0" placeholder="0-5">
            </div>
            <div class="input-group">
                <label>MLOps 与可观测性</label>
                <input type="number" id="mlops" min="0" max="5" step="0.5" value="0" placeholder="0-5">
            </div>
            <div class="input-group">
                <label>数据工程</label>
                <input type="number" id="data" min="0" max="5" step="0.5" value="0" placeholder="0-5">
            </div>
            <div class="input-group">
                <label>AI 安全与对齐</label>
                <input type="number" id="security" min="0" max="5" step="0.5" value="0" placeholder="0-5">
            </div>
            <div class="input-group">
                <label>系统架构</label>
                <input type="number" id="arch" min="0" max="5" step="0.5" value="0" placeholder="0-5">
            </div>
        </div>

        <button class="btn" onclick="updateChart(true)">生成雷达图</button>

        <div class="chart-container">
            <canvas id="radarChart"></canvas>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: rgba(88,166,255,0.25); border: 2px solid #58a6ff;"></div>
                <span>市场需求</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: rgba(248,81,73,0.25); border: 2px solid #f85149;"></div>
                <span>你的能力</span>
            </div>
        </div>
    </div>

    <p class="back-link">
        <a href="https://github.com/dkken/ai-engineer-playbook">← 返回 AI Engineer Playbook</a>
    </p>

    <script>
        // 市场需求数据（市场预期模型，0-4分，满分4分）
        const marketDemand = [3.5, 3.0, 3.5, 3.8, 3.2, 3.5, 3.5, 3.2, 3.5, 2.8, 3.0, 3.0];

        const labels = [
            'Python 编程',
            '软件工程',
            'LLM 应用开发',
            'RAG 系统',
            'Prompt Engineering',
            '容器化与部署',
            'Agent 开发',
            '模型评估与优化',
            'MLOps 与可观测性',
            '数据工程',
            'AI 安全与对齐',
            '系统架构'
        ];

        let chart = null;

        async function submitAssessment(scores) {
            if (!ASSESSMENT_CONFIG.enabled || !ASSESSMENT_CONFIG.GAS_ENDPOINT) {
                return;
            }
            try {
                await fetch(ASSESSMENT_CONFIG.GAS_ENDPOINT, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        python: scores[0],
                        software_engineering: scores[1],
                        llm_development: scores[2],
                        rag: scores[3],
                        prompt_engineering: scores[4],
                        deployment: scores[5],
                        agent: scores[6],
                        evaluation: scores[7],
                        mlops: scores[8],
                        data_engineering: scores[9],
                        security: scores[10],
                        architecture: scores[11],
                        source: ASSESSMENT_CONFIG.source || 'radar-chart'
                    })
                });
            } catch (e) {
                console.log('数据记录失败（非关键）:', e);
            }
        }

        function getUserScores() {
            return [
                parseFloat(document.getElementById('python').value) || 0,
                parseFloat(document.getElementById('se').value) || 0,
                parseFloat(document.getElementById('llm').value) || 0,
                parseFloat(document.getElementById('rag').value) || 0,
                parseFloat(document.getElementById('prompt').value) || 0,
                parseFloat(document.getElementById('deploy').value) || 0,
                parseFloat(document.getElementById('agent').value) || 0,
                parseFloat(document.getElementById('eval').value) || 0,
                parseFloat(document.getElementById('mlops').value) || 0,
                parseFloat(document.getElementById('data').value) || 0,
                parseFloat(document.getElementById('security').value) || 0,
                parseFloat(document.getElementById('arch').value) || 0
            ];
        }

        let lastSubmittedScores = null;

        function updateChart(shouldSubmit) {
            if (shouldSubmit === undefined) shouldSubmit = false;
            const userScores = getUserScores();

            if (shouldSubmit) {
                const scoresKey = userScores.join(',');
                const hasNonZero = userScores.some(s => s > 0);
                if (scoresKey !== lastSubmittedScores && hasNonZero) {
                    submitAssessment(userScores);
                    lastSubmittedScores = scoresKey;
                }
            }

            if (chart) {
                chart.destroy();
            }

            const ctx = document.getElementById('radarChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '市场需求',
                            data: marketDemand,
                            backgroundColor: 'rgba(88,166,255,0.2)',
                            borderColor: '#58a6ff',
                            borderWidth: 2,
                            pointBackgroundColor: '#58a6ff',
                            pointBorderColor: '#0d1117',
                            pointHoverBackgroundColor: '#0d1117',
                            pointHoverBorderColor: '#79c0ff'
                        },
                        {
                            label: '你的能力',
                            data: userScores,
                            backgroundColor: 'rgba(248,81,73,0.2)',
                            borderColor: '#f85149',
                            borderWidth: 2,
                            pointBackgroundColor: '#f85149',
                            pointBorderColor: '#0d1117',
                            pointHoverBackgroundColor: '#0d1117',
                            pointHoverBorderColor: '#ff7b72'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 5,
                            min: 0,
                            ticks: {
                                stepSize: 1,
                                color: '#6e7681',
                                backdropColor: 'transparent',
                                callback: function(value) {
                                    const labels = ['', '了解', 'Demo', '生产', '专家', '顶尖'];
                                    return labels[value] || '';
                                }
                            },
                            pointLabels: {
                                font: { size: 12 },
                                color: '#8b949e'
                            },
                            grid: {
                                color: 'rgba(48,54,61,0.6)'
                            },
                            angleLines: {
                                color: 'rgba(48,54,61,0.6)'
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#161b22',
                            titleColor: '#e6edf3',
                            bodyColor: '#8b949e',
                            borderColor: '#30363d',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    const levelLabels = ['完全不会', '了解概念', '做过Demo', '生产级', '能指导他人', '行业顶尖'];
                                    const value = Math.round(context.raw);
                                    return context.dataset.label + ': ' + levelLabels[value] + ' (' + context.raw + ')';
                                }
                            }
                        }
                    }
                }
            });
        }

        // 初始化图表
        updateChart(false);
    </script>
</body>
</html>
